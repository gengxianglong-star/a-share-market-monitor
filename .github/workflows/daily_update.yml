# A-Share Market Monitor — 云端每日自动更新
# DuckDB 存 Release；JSON/看板数据仍 commit 到 data/
name: A-Share Market Monitor Daily Update

on:
  schedule:
    # UTC 07:45 = 北京时间 15:45（A 股收盘后）
    - cron: "45 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download DuckDB from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          echo "尝试从 Release data-latest 下载 DuckDB..."
          gh release download data-latest \
            --pattern "market_monitor.duckdb" \
            --dir data/ \
            || echo "未找到历史数据库，将尝试从仓库内 legacy 文件迁移初始化。"

      - name: Run Daily Data Pipeline
        env:
          NO_PROXY: "*"
        run: python daily_job.py

      - name: Upload DuckDB to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: "📊 最新市场数据 (Latest Data)"
          body: "由 GitHub Actions 自动更新的 A 股 Market Monitor DuckDB 文件。"
          files: data/market_monitor.duckdb
          make_latest: true

      - name: Commit and Push JSON / Watchlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes in data files to commit."
          else
            git commit -m "chore: daily market monitor update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Prepare Pages site
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp data/market_breadth_history.json data/daily_watchlist.json _site/data/
          if [ -f data/market_breadth_history.csv ]; then
            cp data/market_breadth_history.csv _site/data/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy_pages:
    needs: update_monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Dashboard URL summary
        run: |
          {
            echo "## 📊 在线看板"
            echo ""
            echo "👉 ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
