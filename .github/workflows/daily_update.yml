# A-Share Market Monitor — 云端每日自动更新
name: A-Share Market Monitor Daily Update

on:
  schedule:
    # UTC 07:45 = 北京时间 15:45（A 股收盘后）
    - cron: "45 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Data Pipeline
        env:
          NO_PROXY: "*"
        run: python daily_job.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes in data files to commit."
          else
            git commit -m "chore: daily market monitor update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
