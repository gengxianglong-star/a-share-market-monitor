# [云端调度] GitHub Actions 每日自动运行配置
name: Daily Market Update

on:
  schedule:
    # UTC 07:30 = 北京时间 15:30 (夏令时需注意偏移)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily job
        run: python daily_job.py

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily market data update"
          git push
